name: Go PR checks
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ghcr-push.yaml"
      - ".github/workflows/go-pull-request.yaml"
      - "api/**"
      - ".bazeliskrc"
      - ".bazelrc"
      - ".bazelversion"
      - "BUILD.bazel"
      - "go.mod"
      - "go.sum"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
  pull_request:
    paths:
      - ".github/workflows/ghcr-push.yaml"
      - ".github/workflows/go-pull-request.yaml"
      - "api/**"
      - ".bazeliskrc"
      - ".bazelrc"
      - ".bazelversion"
      - "BUILD.bazel"
      - "go.mod"
      - "go.sum"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }} # Don't cancel workflow runs on main branch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Run `git checkout`
      - uses: actions/checkout@v6
        name: Checkout repo
      - uses: bazel-contrib/setup-bazel@0.18.0
        name: Install Bazel CLI
        with:
          # Avoid downloading Bazel every time
          bazelisk-cache: true
          bazelisk-version: 1.x
          # Share a single disk cache across workflows
          disk-cache: true
          # Enable external repositories caches
          external-cache: true
          # Store a single repository cache
          repository-cache: true
      - name: Build all targets under api
        run: |
          bazel build //api/...
      - name: Test all targets under api
        run: |
          bazel test //api/...
      - name: Run go vet
        run: |
          bazel run @rules_go//go -- vet ./...
