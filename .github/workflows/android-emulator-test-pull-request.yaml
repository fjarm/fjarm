name: Android emulator test PR checks
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-compose-compiler-metrics-pull-request.yaml"
      - ".github/workflows/android-emulator-test-pull-request.yaml"
      - ".github/workflows/android-unit-test-pull-request.yaml"
      - 'android/**.kt'
      - 'android/**.kts'
      - 'android/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings.gradle.kts'
  pull_request:
    paths:
      - ".github/workflows/android-compose-compiler-metrics-pull-request.yaml"
      - ".github/workflows/android-emulator-test-pull-request.yaml"
      - ".github/workflows/android-unit-test-pull-request.yaml"
      - 'android/**.kt'
      - 'android/**.kts'
      - 'android/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings.gradle.kts'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }} # Don't cancel workflow runs on main branch
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [31, 36]
    steps:
      - uses: actions/checkout@v6
        name: Checkout repo

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v5
        name: Set up JDK 21
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v6
        name: Set up Gradle cache
        
      - uses: actions/cache@v5
        name: AVD cache
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb/*
          key: avd-${{ matrix.api-level }}

      - uses: reactivecircus/android-emulator-runner@v2
        name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          arch: x86_64
          target: default
          script: echo "Generated AVD snapshot for caching."

      - uses: reactivecircus/android-emulator-runner@v2
        name: run tests
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          arch: x86_64
          target: default
          script: ./gradlew connectedAndroidTest
