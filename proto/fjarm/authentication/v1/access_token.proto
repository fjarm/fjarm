syntax = "proto3";

package fjarm.authentication.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/fjarm/fjarm/api/pkg/fjarm/authentication/v1";
option java_multiple_files = true;
option java_outer_classname = "AccessTokenProto";
option java_package = "xyz.fjarm.authentication.v1";

message AccessToken {
  optional string access_token = 1 [(buf.validate.field).required = true];
}
