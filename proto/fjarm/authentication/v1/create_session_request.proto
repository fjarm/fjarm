syntax = "proto3";

package fjarm.authentication.v1;

import "buf/validate/validate.proto";
import "fjarm/users/v1/user_email_address.proto";
import "fjarm/users/v1/user_password.proto";

option go_package = "github.com/fjarm/fjarm/api/pkg/fjarm/authentication/v1";
option java_multiple_files = true;
option java_outer_classname = "CreateSessionRequestProto";
option java_package = "xyz.fjarm.authentication.v1";

// A conditional Create request. When the user submits valid authentication credentials, a new
// session is created. If the user submits invalid authentication credentials, no new session is
// created, and an error is returned.
//
// When using this message, the request metadata MUST include an idempotency key (equivalent to a request ID).
message CreateSessionRequest {
  optional fjarm.users.v1.UserEmailAddress email_address = 1 [(buf.validate.field).required = true];
  optional fjarm.users.v1.UserPassword password = 2 [(buf.validate.field).required = true];
}
