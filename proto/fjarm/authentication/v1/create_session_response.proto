syntax = "proto3";

package fjarm.authentication.v1;

import "fjarm/authentication/v1/session.proto";

option go_package = "github.com/fjarm/fjarm/api/pkg/fjarm/authentication/v1";
option java_multiple_files = true;
option java_outer_classname = "CreateSessionResponseProto";
option java_package = "xyz.fjarm.authentication.v1";

// CreateSessionResponse describes the result of attempting an RPC to create an authentication and refresh token
// pair.
// A google.rpc.Status type will be included in the response header metadata.
message CreateSessionResponse {
  optional fjarm.authentication.v1.Session session = 1;
}
