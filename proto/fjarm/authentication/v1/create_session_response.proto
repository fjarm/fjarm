syntax = "proto3";

package fjarm.authentication.v1;

import "buf/validate/validate.proto";
import "fjarm/authentication/v1/access_token.proto";
import "fjarm/authentication/v1/refresh_token.proto";
import "google/rpc/status.proto";

option go_package = "github.com/fjarm/fjarm/api/pkg/fjarm/authentication/v1";
option java_multiple_files = true;
option java_outer_classname = "CreateSessionResponseProto";
option java_package = "xyz.fjarm.authentication.v1";

// CreateSessionResponse describes the result of attempting an RPC to create an authentication and refresh token
// pair.
message CreateSessionResponse {
  // The status of the RPC request to create an authentication and refresh token pair.
  optional google.rpc.Status status = 1;

  // The access token or an empty result if the RPC was unsuccessful.
  optional fjarm.authentication.v1.AccessToken access_token = 2 [(buf.validate.field).required = true];

  // The refresh token or an empty result if the RPC was unsuccessful.
  optional fjarm.authentication.v1.RefreshToken refresh_token = 3 [(buf.validate.field).required = true];
}
