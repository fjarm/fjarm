syntax = "proto3";

package fjarm.authentication.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/fjarm/fjarm/api/pkg/fjarm/authentication/v1";
option java_multiple_files = true;
option java_outer_classname = "SessionIdProto";
option java_package = "xyz.fjarm.authentication.v1";

// SessionId uniquely identifies a session.
message SessionId {
  optional string session_id = 1 [(buf.validate.field).required = true];
}
